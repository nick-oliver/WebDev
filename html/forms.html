<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Demo</title>
</head>

<body>
    <h1>Forms Demo</h1>
    <form action="/search/">
        <p>
            <label for="username">Enter a Username: </label>
            <input id="username" type="text" placeholder="username" name="username">
        </p>
        <p>
            <label for="password">Enter your Password: </label>
            <input id="password" type="password" placeholder="password" name="password">
        </p>
        <p>
            <label for="color">Choose your Favorite Color</label>
            <input id="color" type="color">
        </p>
        <p>
            <label for="number">Enter your Phone Number</label>
            <input id="number" type="number" placeholder="Mobile#" name="number">
        </p>
        <button>Submit</button>
    </form>
    <!-- How to set up search outside of the form -->
    <h2>Bootlegging Search Engines</h2>
    <h3>Google</h3>
    <form action="https://www.google.com/search" target="_blank">
        <input type="text" name="q">
        <button>Search Google</button>
    </form>
    <h3>YouTube</h3>
    <form action="https://www.youtube.com/results" target="_blank">
        <input type="text" name="search_query">
        <button>Search YouTube</button>
    </form>
    <h3>Reddit</h3>
    <form action="https://www.reddit.com/search">
        <input type="text" name="q">
        <button>Search Reddit</button>
    </form>
    <h2>More Input Actions</h2>
    <form action="search" target="_blank">
        <input type="checkbox" name="agree_tos" id="agree">
        <label for="agree">Yes, I agree</label>
        <p>
            <label for="xs">XS</label>
            <input type="radio" name="size" id="xs" value="xs">
            <label for="s">S</label>
            <input type="radio" name="size" id="s" value="s">
            <label for="m">M</label>
            <input type="radio" name="size" id="m" value="m">
            <label for="l">L</label>
            <input type="radio" name="size" id="l" value="l">
        </p>
        <p>
            <label for="city">Please Select your Location</label>
            <select name="city" id="city">
                <option value="dallas">Dallas</option>
                <option value="houston">Houston</option>
                <option value="austin">Austin</option>
                <option value="san_antonio">San Antonio</option>
            </select>
        </p>
        <p>
            <label for="cheese">Amount of Cheese</label>
            <input type="range" id="cheese" min="0" max="10" name="cheese_amount">
        </p>
        <p>
            <label for="comments">Comments</label>
            <textarea name="comments" id="coments" rows="10" cols="40"></textarea>
        </p>
        <button>Submit</button>

        <h2>Validation Demo</h2>
        <form action="/revenge">
            <label for="first">Enter First Name</label>
            <input type="text" name="first" id="first" required>
            <p>
                <label for="username">UserName</label>
                <input type="text" id="username" name="username" minlength="5" maxlength="20" required>
            </p>
            <!-- Below two items are for pattern recognition -->
            <p>
                <label for="email">Enter your Email Address</label>
                <input type="email" required>
            </p>
            <p>
                <label for="url">Enter Your Webpage URL</label>
                <input type="url">
            </p>
            <button>Submit</button>
        </form>
    </form>
</body>

</html>
